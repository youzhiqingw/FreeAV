name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd app/build/outputs/apk/release
          mv app-release-unsigned.apk javbrowser-${VERSION}.apk || mv app-release.apk javbrowser-${VERSION}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/javbrowser-*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
