<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LockActivity - Material Design 3</title>
  <style>
    /* Material Design 3 主题 - 深色模式 */
    :root {
      --md-sys-color-primary: #D0BCFF;
      --md-sys-color-on-primary: #381E72;
      --md-sys-color-primary-container: #4F378B;
      --md-sys-color-on-primary-container: #EADDFF;
      --md-sys-color-secondary: #CCC2DC;
      --md-sys-color-on-secondary: #332D41;
      --md-sys-color-secondary-container: #4A4458;
      --md-sys-color-on-secondary-container: #E8DEF8;
      --md-sys-color-tertiary: #EFB8C8;
      --md-sys-color-on-tertiary: #492532;
      --md-sys-color-tertiary-container: #633B48;
      --md-sys-color-on-tertiary-container: #FFD8E4;
      --md-sys-color-error: #F2B8B5;
      --md-sys-color-on-error: #601410;
      --md-sys-color-surface: #1C1B1F;
      --md-sys-color-on-surface: #E6E1E5;
      --md-sys-color-surface-variant: #49454F;
      --md-sys-color-on-surface-variant: #CAC4D0;
      --md-sys-color-outline: #938F99;
      --md-sys-color-outline-variant: #49454F;
      --md-sys-color-background: #1C1B1F;
      --md-sys-color-on-background: #E6E1E5;

      --md-sys-elevation-level0: none;
      --md-sys-elevation-level1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
      --md-sys-elevation-level2: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
      --md-sys-elevation-level3: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.3);
    }

    /* 日间模式 */
    [data-theme="light"] {
      --md-sys-color-primary: #6750A4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #EADDFF;
      --md-sys-color-on-primary-container: #21005D;
      --md-sys-color-secondary: #625B71;
      --md-sys-color-on-secondary: #FFFFFF;
      --md-sys-color-secondary-container: #E8DEF8;
      --md-sys-color-on-secondary-container: #1D192B;
      --md-sys-color-tertiary: #7D5260;
      --md-sys-color-on-tertiary: #FFFFFF;
      --md-sys-color-tertiary-container: #FFD8E4;
      --md-sys-color-on-tertiary-container: #31111D;
      --md-sys-color-error: #B3261E;
      --md-sys-color-on-error: #FFFFFF;
      --md-sys-color-surface: #FFFBFE;
      --md-sys-color-on-surface: #1C1B1F;
      --md-sys-color-surface-variant: #E7E0EC;
      --md-sys-color-on-surface-variant: #49454F;
      --md-sys-color-outline: #79747E;
      --md-sys-color-outline-variant: #CAC4D0;
      --md-sys-color-background: #FFFBFE;
      --md-sys-color-on-background: #1C1B1F;

      --md-sys-elevation-level0: none;
      --md-sys-elevation-level1: 0 1px 3px 1px rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.3);
      --md-sys-elevation-level2: 0 2px 6px 2px rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.3);
      --md-sys-elevation-level3: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Roboto', sans-serif;
      background: var(--md-sys-color-background);
      color: var(--md-sys-color-on-surface);
      overflow: hidden;
    }

    /* 响应式容器 */
    .device-frame {
      width: 100%;
      height: 100vh;
      max-width: 100%;
      margin: 0 auto;
      background: var(--md-sys-color-surface);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* 状态栏 */
    .status-bar {
      height: clamp(24px, 3.5vw, 32px);
      padding: 0 clamp(12px, 2vw, 16px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: clamp(10px, 1.2vw, 12px);
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
      background: var(--md-sys-color-surface);
      flex-shrink: 0;
    }

    .status-icons {
      display: flex;
      gap: clamp(4px, 0.8vw, 6px);
      align-items: center;
    }

    /* 主内容区 */
    .lock-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 5vw, 48px) clamp(16px, 3vw, 32px) clamp(16px, 3vw, 32px);
      position: relative;
      min-height: 0;
    }

    /* 应用图标 - MD3 风格圆角 */
    .app-icon-container {
      position: relative;
      margin-bottom: clamp(16px, 3vw, 32px);
    }

    .app-icon {
      width: clamp(64px, 12vw, 96px);
      height: clamp(64px, 12vw, 96px);
      border-radius: clamp(20px, 3vw, 28px);
      background: linear-gradient(135deg, var(--md-sys-color-primary-container) 0%, var(--md-sys-color-primary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--md-sys-elevation-level2);
    }

    .app-icon svg {
      width: clamp(36px, 6vw, 56px);
      height: clamp(36px, 6vw, 56px);
      fill: var(--md-sys-color-on-primary-container);
    }

    /* 应用名称 */
    .app-title {
      font-size: clamp(22px, 3.5vw, 28px);
      font-weight: 400;
      color: var(--md-sys-color-on-surface);
      margin-bottom: clamp(4px, 1vw, 8px);
      text-align: center;
      letter-spacing: 0;
    }

    .app-subtitle {
      font-size: clamp(12px, 1.8vw, 14px);
      font-weight: 400;
      color: var(--md-sys-color-on-surface-variant);
      text-align: center;
      line-height: 1.5;
      margin-bottom: clamp(32px, 6vw, 56px);
      max-width: 400px;
    }

    /* 生物识别图标 - MD3 动画 */
    .biometric-container {
      position: relative;
      margin-bottom: clamp(16px, 3vw, 24px);
    }

    .biometric-ripple {
      position: absolute;
      width: clamp(80px, 15vw, 120px);
      height: clamp(80px, 15vw, 120px);
      border-radius: 50%;
      border: 2px solid var(--md-sys-color-primary);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: ripple 2s ease-out infinite;
      opacity: 0;
    }

    .biometric-ripple:nth-child(2) {
      animation-delay: 0.7s;
    }

    @keyframes ripple {
      0% {
        width: clamp(60px, 10vw, 80px);
        height: clamp(60px, 10vw, 80px);
        opacity: 0.6;
      }
      100% {
        width: clamp(120px, 20vw, 140px);
        height: clamp(120px, 20vw, 140px);
        opacity: 0;
      }
    }

    .biometric-icon {
      width: clamp(56px, 10vw, 80px);
      height: clamp(56px, 10vw, 80px);
      border-radius: 50%;
      background: var(--md-sys-color-surface-variant);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      box-shadow: var(--md-sys-elevation-level1);
    }

    .biometric-icon svg {
      width: clamp(28px, 5vw, 40px);
      height: clamp(28px, 5vw, 40px);
      fill: var(--md-sys-color-primary);
    }

    /* 提示文字 */
    .unlock-message {
      font-size: clamp(14px, 2vw, 16px);
      font-weight: 400;
      color: var(--md-sys-color-on-surface);
      margin-bottom: clamp(32px, 5vw, 48px);
      text-align: center;
      letter-spacing: 0.15px;
    }

    /* MD3 填充按钮 - Filled Button */
    .filled-button {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border: none;
      border-radius: 20px;
      padding: clamp(8px, 1.5vw, 10px) clamp(20px, 3vw, 24px);
      font-size: clamp(12px, 1.5vw, 14px);
      font-weight: 500;
      letter-spacing: 0.1px;
      cursor: pointer;
      box-shadow: var(--md-sys-elevation-level1);
      transition: all 200ms cubic-bezier(0.2, 0, 0, 1);
      min-height: clamp(36px, 5vw, 40px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 1vw, 8px);
    }

    .filled-button:hover {
      box-shadow: var(--md-sys-elevation-level2);
      background: color-mix(in srgb, var(--md-sys-color-primary) 92%, white);
    }

    .filled-button:active {
      box-shadow: var(--md-sys-elevation-level1);
      transform: scale(0.98);
    }

    /* 倒计时 */
    .countdown-text {
      margin-top: clamp(16px, 3vw, 24px);
      font-size: clamp(10px, 1.2vw, 12px);
      font-weight: 400;
      color: var(--md-sys-color-on-surface-variant);
      text-align: center;
      letter-spacing: 0.4px;
    }

    /* 安全提示 - MD3 Surface Tint */
    .security-notice {
      position: absolute;
      bottom: clamp(12px, 2vw, 20px);
      left: clamp(16px, 3vw, 24px);
      right: clamp(16px, 3vw, 24px);
      padding: clamp(8px, 1.5vw, 12px) clamp(12px, 2vw, 16px);
      background: var(--md-sys-color-surface-variant);
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.5vw, 12px);
      max-width: 500px;
      margin: 0 auto;
    }

    .security-icon {
      width: clamp(16px, 2.5vw, 20px);
      height: clamp(16px, 2.5vw, 20px);
      flex-shrink: 0;
      fill: var(--md-sys-color-on-surface-variant);
    }

    .security-text {
      font-size: clamp(10px, 1.2vw, 12px);
      font-weight: 400;
      color: var(--md-sys-color-on-surface-variant);
      line-height: 1.4;
      letter-spacing: 0.4px;
    }

    /* 大屏幕适配 */
    @media (min-width: 768px) {
      .lock-container {
        justify-content: center;
        gap: clamp(16px, 3vw, 24px);
      }

      .app-subtitle {
        margin-bottom: clamp(24px, 4vw, 40px);
      }

      .biometric-container {
        margin-bottom: clamp(12px, 2vw, 20px);
      }

      .unlock-message {
        margin-bottom: clamp(24px, 4vw, 40px);
      }
    }

    /* 大屏幕 - 居中显示 */
    @media (min-width: 1024px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: #0f0f12;
      }

      .device-frame {
        max-width: 480px;
        height: calc(100vh - 32px);
        max-height: 900px;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 24px 48px rgba(0,0,0,0.4);
      }

      .security-notice {
        position: absolute;
        bottom: 20px;
        left: 24px;
        right: 24px;
      }
    }

    [data-theme="light"] body {
      background: #f0edf5;
    }

    /* 平板横屏 */
    @media (min-width: 768px) and (orientation: landscape) {
      .device-frame {
        max-width: 600px;
      }

      .lock-container {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-content: center;
        gap: 24px;
      }

      .app-icon-container,
      .app-title,
      .app-subtitle {
        width: 100%;
      }

      .biometric-container,
      .unlock-message,
      .filled-button,
      .countdown-text {
        width: auto;
      }
    }

    /* 小屏手机优化 */
    @media (max-width: 360px) {
      .lock-container {
        padding: 16px 12px;
      }

      .app-icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
      }

      .app-icon svg {
        width: 32px;
        height: 32px;
      }

      .biometric-icon {
        width: 48px;
        height: 48px;
      }

      .biometric-icon svg {
        width: 24px;
        height: 24px;
      }

      .security-notice {
        padding: 6px 10px;
        gap: 6px;
      }

      .security-text {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="device-frame">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span>14:32</span>
      <div class="status-icons">
        <span>5G</span>
        <span>▂▄▆█</span>
        <span>85%</span>
      </div>
    </div>

    <!-- 主内容 -->
    <div class="lock-container">
      <!-- 应用图标 -->
      <div class="app-icon-container">
        <div class="app-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
          </svg>
        </div>
      </div>

      <!-- 标题 -->
      <h1 class="app-title">安全浏览器</h1>
      <p class="app-subtitle">请验证身份以继续访问<br>您的隐私数据已加密保护</p>

      <!-- 生物识别 -->
      <div class="biometric-container">
        <div class="biometric-ripple"></div>
        <div class="biometric-ripple"></div>
        <div class="biometric-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.81 4.47c-.08 0-.16-.02-.23-.06C15.66 3.42 14 3 12.01 3c-1.98 0-3.86.47-5.57 1.41-.24.13-.54.04-.68-.2-.13-.24-.04-.55.2-.68C7.82 2.52 9.86 2 12.01 2c2.13 0 3.99.47 6.03 1.52.25.13.34.43.21.67-.09.18-.26.28-.44.28zM3.5 9.72c-.1 0-.2-.03-.29-.09-.23-.16-.28-.47-.12-.7.99-1.4 2.25-2.5 3.75-3.27.24-.13.54-.04.68.2.13.24.04.55-.2.68-1.3.69-2.4 1.62-3.18 2.75-.08.14-.23.23-.39.23-.08 0-.15-.02-.25-.08zm14.75.05c-.08.18-.26.28-.44.28-.08 0-.16-.02-.23-.06-.23-.13-.31-.44-.18-.68.44-.77.67-1.62.67-2.52 0-.23.19-.42.42-.42s.42.19.42.42c0 1.05-.27 2.06-.66 3.05zM5.8 20.1c-.1 0-.2-.03-.29-.09-.23-.16-.28-.47-.12-.7 1.73-2.4 4.42-3.85 7.21-3.85.23 0 .42.19.42.42s-.19.42-.42.42c-2.46 0-4.83 1.27-6.38 3.4-.08.14-.23.23-.39.23-.08 0-.15-.02-.25-.08zm12.6-3.45c-.23 0-.42-.19-.42-.42 0-2.06-.83-3.99-2.35-5.44-.08-.08-.12-.19-.11-.3s.06-.21.15-.28c.08-.06.19-.09.29-.09.12 0 .23.04.32.12 1.74 1.66 2.72 3.9 2.72 6.29 0 .23-.19.42-.42.42z"/>
          </svg>
        </div>
      </div>

      <!-- 提示 -->
      <p class="unlock-message">触摸指纹传感器</p>

      <!-- 按钮 -->
      <button class="filled-button">
        <span>立即进入</span>
      </button>

      <!-- 倒计时 -->
      <p class="countdown-text">验证成功后 3 秒自动跳转</p>

      <!-- 安全提示 -->
      <div class="security-notice">
        <svg class="security-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
        </svg>
        <span class="security-text">禁止截屏 · FLAG_SECURE 已启用</span>
      </div>
    </div>
  </div>
  <script>
  (function() {
    try {
      const pref = localStorage.getItem('theme-mode') || 'system';
      let isDark;
      if (pref === 'system') {
        isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      } else if (pref === 'on') {
        isDark = true;
      } else {
        isDark = false;
      }
      if (!isDark) document.documentElement.setAttribute('data-theme', 'light');
    } catch(e) {}
  })();
  </script>
</body>
</html>
